name: RamDoubler
options:
  bundleIdPrefix: com.ramdoubler
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    PRODUCT_NAME: "RamDoubler X"
    CODE_SIGN_IDENTITY: "Developer ID Application"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: KR6GAN67JK
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  RamDoubler:
    type: application
    platform: macOS
    sources:
      - path: RamDoubler
        type: group
        excludes:
          - "*.xcassets"
    resources:
      - path: RamDoubler/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: RamDoubler/Info.plist
        CODE_SIGN_ENTITLEMENTS: RamDoubler/RamDoubler.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ramdoubler.app
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
